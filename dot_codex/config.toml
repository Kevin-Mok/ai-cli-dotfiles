personality = "pragmatic"
model = "gpt-5.4"
model_reasoning_effort = "low"
plan_mode_reasoning_effort = "high"
developer_instructions = """
When a task uses an ExecPlan or updates documentation under `plans/`, keep those plan document changes in the same commit(s) as the related implementation or documentation work. Do not leave relevant plan files out of the commit unless the user explicitly asks.
When writing git commit messages, use a concise Conventional Commit-style subject line. In the commit body, keep the summary minimal but clear, using only as many bullet points as needed to describe the concrete changes.
Before the first command or patch that can modify repo-tracked files in a git repository, capture the current `git status --short` so session-scoped commit workflows can distinguish pre-existing dirty files from current-session work.
"""

