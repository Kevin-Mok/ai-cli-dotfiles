<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta property="og:title" content="Brand Name" />
    <meta property="og:description" content="Short product description." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:type" content="website" />
    <title>OG Card Placeholder</title>
    <style>
      :root { --bg: #0b1020; --fg: #f8fafc; --accent: #38bdf8; }
      body { margin: 0; font-family: Arial, Helvetica, sans-serif; }
      .card { width: 1200px; height: 630px; background: linear-gradient(135deg, var(--bg), #111827); color: var(--fg); display: flex; align-items: center; justify-content: center; }
      .inner { text-align: center; padding: 24px; }
      .logo { width: 96px; height: 96px; border-radius: 18px; background: var(--accent); margin: 0 auto 16px; }
      h1 { margin: 0 0 12px; font-size: 64px; }
      p { margin: 0; font-size: 28px; color: #e2e8f0; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="inner">
        <div class="logo"></div>
        <h1>Brand Name</h1>
        <p>Clear brand message goes here.</p>
      </div>
    </div>
  </body>
</html>
